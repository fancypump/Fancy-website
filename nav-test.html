<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nav Test</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
.site-header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 60px; background: #fff; border-bottom: 1px solid #ddd; }
.site-header .container { display: flex; align-items: center; height: 100%; }
.nav-main { display: flex; align-items: center; }
.nav-main__list { display: flex; list-style: none; gap: 2px; }
.nav-main__link { display: block; padding: 0.6rem 1rem; color: #333; text-decoration: none; }
.nav-toggle { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0.5rem; }
@media (max-width: 768px) {
  .nav-main__list {
    position: fixed;
    top: 60px;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 9999;
    background: #1a1a2e;
    flex-direction: column;
    padding: 2rem;
    gap: 0.5rem;
    overflow-y: auto;
    display: none;
  }
  .nav-main__list--open {
    display: flex !important;
  }
  .nav-main__link { color: #ccc; padding: 0.8rem 1rem; }
  .nav-toggle { display: block; position: relative; z-index: 10001; }
}
body { padding-top: 80px; font-family: system-ui; }
</style>
</head>
<body>
<header class="site-header">
  <div class="container">
    <nav class="nav-main">
      <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
      <ul class="nav-main__list">
        <li><a href="#" class="nav-main__link">Home</a></li>
        <li><a href="#" class="nav-main__link">About</a></li>
        <li><a href="#" class="nav-main__link">Products</a></li>
        <li><a href="#" class="nav-main__link">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>
<h1>Mobile Nav Test</h1>
<p>Resize browser to 768px or less, then click the hamburger icon.</p>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var navToggle = document.querySelector('.nav-toggle');
  var navList = document.querySelector('.nav-main__list');
  if (navToggle && navList) {
    navToggle.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      var isShown = navList.classList.toggle('nav-main__list--open');
      navToggle.textContent = isShown ? '✕' : '☰';
    });
  }
});
</script>
</body>
</html>
